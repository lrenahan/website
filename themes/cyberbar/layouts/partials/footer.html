<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <div>
        <p class="footer-copy">
          &copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.
        </p>
        <p class="footer-copy" style="margin-top:0.25rem;">
          Cyber Security Expert &middot; Author &middot; Educator
        </p>
      </div>
      <ul class="footer-links">
        {{ with .Site.Params.youtube }}<li><a href="{{ . }}" target="_blank" rel="noopener">YouTube</a></li>{{ end }}
        {{ with .Site.Params.linkedin }}<li><a href="{{ . }}" target="_blank" rel="noopener">LinkedIn</a></li>{{ end }}
        {{ with .Site.Params.github }}<li><a href="{{ . }}" target="_blank" rel="noopener">GitHub</a></li>{{ end }}
      </ul>
    </div>
  </div>
</footer>
